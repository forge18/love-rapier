name: build native libs

# Cross-builds all four platform shims from a single macOS runner (native cargo for macOS + Windows
# via mingw, cargo-zigbuild for Linux) — the same flow as scripts/build-native.sh locally.
# On a version tag, attaches the binaries to a GitHub Release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchains
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin \
            x86_64-unknown-linux-gnu x86_64-pc-windows-gnu
          brew install zig mingw-w64
          cargo install --locked cargo-zigbuild

      - name: Cross-build all platforms
        run: ./scripts/build-native.sh

      # macOS notarization (optional): provide APPLE_* secrets to enable.
      # - name: Sign + notarize macOS dylibs
      #   if: ${{ secrets.APPLE_DEVELOPER_ID != '' }}
      #   env:
      #     APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      #     APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      #   run: ./scripts/notarize-macos.sh   # codesign + notarytool + staple

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: lib/native/**

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lib/native/**
