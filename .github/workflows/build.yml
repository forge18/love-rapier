name: build native libs

# Cross-builds all four platform shims from a single macOS runner (native cargo for macOS + Windows
# via mingw, cargo-zigbuild for Linux) — the same flow as scripts/build-native.sh locally.
# On a version tag, attaches the binaries to a GitHub Release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Runtime-test the actual compiled binary on each platform: build the host shim natively, drop it
  # where the FFI loader expects (lib/native/<platdir>/), then run the busted suite under LuaJIT.
  # This is the only place the Linux/Windows/Intel-mac binaries are *executed* (the cross-build job
  # below only compiles them), so it gates the release.
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, platdir: macos-arm64, lib: librapier_shim.dylib }
          - { os: macos-13, platdir: macos-x86_64, lib: librapier_shim.dylib }
          - { os: ubuntu-latest, platdir: linux-x64, lib: librapier_shim.so }
          - { os: windows-latest, platdir: windows-x64, lib: rapier_shim.dll }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build the host shim
        shell: bash
        run: |
          cargo build --release --manifest-path native/rapier_shim/Cargo.toml
          mkdir -p "lib/native/${{ matrix.platdir }}"
          cp "native/rapier_shim/target/release/${{ matrix.lib }}" "lib/native/${{ matrix.platdir }}/${{ matrix.lib }}"

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: luajit-openresty # bare "luajit" 404s; openresty's LuaJIT is reliably hosted

      - name: Run tests
        shell: bash
        # Dependency-free runner (no luarocks/busted — luarocks can't load its manifest under LuaJIT).
        # The LuaJIT binary installed above is named `luajit` (a luajit version), not `lua`; resolve
        # whichever is present. The FFI loader resolves ./lib/native/<platform>/.
        run: |
          bin="$(command -v luajit || command -v lua || true)"
          echo "interpreter: ${bin:-<none found>}"
          test -n "$bin" || { echo "no luajit/lua on PATH"; exit 1; }
          "$bin" tests/run.lua

  build:
    needs: test
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchains
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin \
            x86_64-unknown-linux-gnu x86_64-pc-windows-gnu
          brew install zig mingw-w64
          cargo install --locked cargo-zigbuild

      - name: Cross-build all platforms
        run: ./scripts/build-native.sh

      # macOS notarization (optional): provide APPLE_* secrets to enable.
      # - name: Sign + notarize macOS dylibs
      #   if: ${{ secrets.APPLE_DEVELOPER_ID != '' }}
      #   env:
      #     APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      #     APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      #   run: ./scripts/notarize-macos.sh   # codesign + notarytool + staple

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: lib/native/**

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lib/native/**
