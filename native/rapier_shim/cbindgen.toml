# cbindgen config — generates the C header that src/util/physics/ffi.lua mirrors in its ffi.cdef.
# Run: cbindgen --config cbindgen.toml --crate rapier_shim --output rapier_shim.h
language = "C"
include_guard = "RAPIER_SHIM_H"
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. */"
tab_width = 2
documentation = true
style = "type"

[export]
prefix = ""
